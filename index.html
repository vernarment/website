<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caara // space</title>
    <style>
        html, body {
            background-color: #161616; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: "Times New Roman", Times, serif;
        }
        
        .screen-container {
            background-color: #fffef7; 
            width: 1400px;
            max-width: 90%;
            min-height: 100vh;         
            box-sizing: border-box;
            padding: 60px 40px;
            position: relative;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        h1 {
            color: #343025; 
            font-size: 2.4rem;
            font-style: italic;
            font-weight: normal;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            width: 100%;
        }

        .side-menu {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 1.2rem;
            font-style: italic;
            white-space: nowrap;
        }
        .side-menu a {
            color: #0000ff;
            text-decoration: underline;
            margin-bottom: 12px;
        }

        .side-menu a:hover {
            color: #ff0000;
        }

        .cover-image {
            width: 550px;
            height: auto;
            display: block;
            filter: contrast(1.1) saturate(0.9);
        }
    </style>
</head>
<body>

    <div class="screen-container">
        
        <div style="position: absolute; top: 25px; left: 30px; font-style: italic; font-size: 0.95rem; color: #0000ff; text-transform: uppercase; user-select: none; letter-spacing: 1px;">
            LOCAL TIME - <span id="clock">00:00:00 AM</span>
        </div>

        <h1>caara</h1>

        <div class="main-content">
            <div class="side-menu">
                <a href="contact.html">contact</a>
                <a href="blog.html">blog</a>
            </div>
            <img class="cover-image" src="https://i.imgur.com/hhU5suvl.jpg" alt="Analog Space">
        </div>

    </div>

    <script>
        function updateClock() {
            const clockElement = document.getElementById('clock');
            const now = new Date();
            const options = {
                timeZone: 'Asia/Yekaterinburg',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            const formatter = new Intl.DateTimeFormat('en-US', options);
            clockElement.textContent = formatter.format(now);
        }
        updateClock();
        setInterval(updateClock, 500);
    </script>
</body>
</html>
